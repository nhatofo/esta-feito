steps:
  # ── Step 1: Pull cache ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: pull-cache
    entrypoint: bash
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/esta-feito-api:latest || true']

  # ── Step 2: Build ───────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - --file=apps/backend/Dockerfile
      - --tag=gcr.io/$PROJECT_ID/esta-feito-api:$SHORT_SHA
      - --tag=gcr.io/$PROJECT_ID/esta-feito-api:latest
      - --cache-from=gcr.io/$PROJECT_ID/esta-feito-api:latest
      - .
    waitFor: ['pull-cache']

  # ── Step 3: Push ────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-sha
    args: ['push', 'gcr.io/$PROJECT_ID/esta-feito-api:$SHORT_SHA']
    waitFor: ['build']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-latest
    args: ['push', 'gcr.io/$PROJECT_ID/esta-feito-api:latest']
    waitFor: ['build']

  # ── Step 4: Deploy ──────────────────────────────────────────────
  # Secrets are injected via --set-secrets.
  # Run create-secrets.sh BEFORE this build to create them in Secret Manager.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - esta-feito-api
      - --image=gcr.io/$PROJECT_ID/esta-feito-api:$SHORT_SHA
      - --region=africa-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=60s
      - --set-env-vars=NODE_ENV=production,MPESA_ENV=sandbox
      - --set-secrets=MONGODB_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,TWILIO_ACCOUNT_SID=TWILIO_ACCOUNT_SID:latest,TWILIO_AUTH_TOKEN=TWILIO_AUTH_TOKEN:latest,TWILIO_PHONE_NUMBER=TWILIO_PHONE_NUMBER:latest,CLOUDINARY_CLOUD_NAME=CLOUDINARY_CLOUD_NAME:latest,CLOUDINARY_API_KEY=CLOUDINARY_API_KEY:latest,CLOUDINARY_API_SECRET=CLOUDINARY_API_SECRET:latest
      - --quiet
    waitFor: ['push-sha', 'push-latest']

  # ── Step 5: Health check ────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: healthcheck
    entrypoint: bash
    args:
      - -c
      - |
        sleep 20
        URL=$(gcloud run services describe esta-feito-api \
          --region=africa-south1 \
          --format="value(status.url)" 2>/dev/null || echo "")
        if [ -z "$$URL" ]; then echo "No URL yet"; exit 0; fi
        STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$$URL/health" || echo "000")
        echo "Health: HTTP $$STATUS at $$URL/health"
    waitFor: ['deploy']

timeout: 1200s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
images:
  - gcr.io/$PROJECT_ID/esta-feito-api:$SHORT_SHA
  - gcr.io/$PROJECT_ID/esta-feito-api:latest
